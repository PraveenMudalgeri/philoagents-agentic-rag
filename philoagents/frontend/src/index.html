<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BodyAgents</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    #chat-overlay {
      display: none;
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1080px, calc(100vw - 24px));
      background: rgba(13, 19, 28, 0.96);
      border: 2px solid rgba(236, 219, 180, 0.38);
      border-radius: 14px;
      padding: 16px;
      z-index: 100;
      color: #f5e7c7;
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.45);
    }

    #chat-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 14px;
      align-items: stretch;
    }

    #chat-main {
      position: relative;
      min-width: 0;
    }

    #chat-messages {
      height: 220px;
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.6;
    }

    #chat-messages .npc {
      color: #e6be77;
      font-weight: bold;
    }

    #chat-messages .user {
      color: #f6f1e4;
    }

    #chat-input-row {
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: rgba(8, 12, 18, 0.95);
      border: 1px solid rgba(236, 219, 180, 0.26);
      border-radius: 8px;
      color: #f5e7c7;
      padding: 8px 12px;
      font-size: 14px;
    }

    #chat-send {
      background: #f3e7c8;
      color: #22180f;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
    }

    #chat-send:hover {
      background: #fff3d5;
    }

    #chat-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #d9be8b;
      cursor: pointer;
      font-size: 18px;
    }

    #npc-name {
      font-size: 16px;
      font-weight: bold;
      color: #e6be77;
      margin-bottom: 10px;
    }

    #npc-media {
      width: 100%;
      margin-bottom: 10px;
      display: none;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(236, 219, 180, 0.2);
      border-radius: 10px;
      background: rgba(8, 12, 18, 0.8);
      padding: 8px;
    }

    #npc-body-preview {
      width: 84px;
      height: 84px;
      border-radius: 10px;
      border: 1px solid rgba(236, 219, 180, 0.28);
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      background-color: rgba(17, 24, 35, 0.9);
      box-shadow: 0 0 0 1px rgba(236, 219, 180, 0.08) inset;
      flex-shrink: 0;
    }

    #npc-media-label {
      color: #d9be8b;
      font-size: 13px;
      line-height: 1.4;
    }

    #body-map-panel {
      border: 1px solid rgba(236, 219, 180, 0.2);
      border-radius: 12px;
      background: rgba(8, 12, 18, 0.86);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 360px;
    }

    .part-image-title {
      color: #f1dab1;
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .part-image-wrap {
      flex: 1;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid rgba(236, 219, 180, 0.14);
      background: radial-gradient(circle at 50% 35%, rgba(65, 87, 120, 0.36), rgba(10, 15, 22, 0.85));
      overflow: hidden;
    }

    .part-image {
      width: 100%;
      max-width: 300px;
      height: 300px;
      border-radius: 12px;
      border: 1px solid rgba(236, 219, 180, 0.2);
      background-color: rgba(17, 24, 35, 0.9);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .part-image.show {
      opacity: 1;
      transform: scale(1);
    }

    .part-image.show:hover {
      transform: scale(1.02);
    }

    .part-image-meta {
      border: 1px solid rgba(236, 219, 180, 0.16);
      border-radius: 10px;
      background: rgba(14, 20, 30, 0.85);
      padding: 8px;
      min-height: 70px;
    }

    .part-image-meta h4 {
      color: #f0d4a3;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .part-image-meta p {
      color: #e8edf8;
      font-size: 12px;
      line-height: 1.45;
    }

    #bgm-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(243, 231, 200, 0.1);
      border: 1.5px solid rgba(236, 219, 180, 0.32);
      color: #f5e7c7;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    #bgm-toggle:hover {
      background: rgba(243, 231, 200, 0.18);
      border-color: rgba(236, 219, 180, 0.52);
      transform: scale(1.08);
    }

    #bgm-toggle:active {
      transform: scale(0.95);
    }

    @media (max-width: 960px) {
      #chat-layout {
        grid-template-columns: 1fr;
      }

      #body-map-panel {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="game-container"></div>
  </main>

  <button id="bgm-toggle" aria-label="Toggle background music" title="Toggle Music (M)">🔊</button>

  <div id="chat-overlay">
    <div id="chat-layout">
      <div id="chat-main">
        <button id="chat-close" aria-label="Close chat">✕</button>
        <div id="npc-name"></div>
        <div id="npc-media">
          <div id="npc-body-preview" aria-hidden="true"></div>
          <div id="npc-media-label">Body part preview</div>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Ask a body question..." autocomplete="off" />
          <button id="chat-send">Send</button>
        </div>
      </div>
      <aside id="body-map-panel"></aside>
    </div>
  </div>
</body>
</html>
