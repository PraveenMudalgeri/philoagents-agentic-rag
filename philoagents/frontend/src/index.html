<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BodyAgents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eaf4ff; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #game-container { position: relative; }
    #chat-overlay {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #9ec5fe;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      font-family: Arial, sans-serif;
      color: #1f2d3d;
    }
    #chat-messages {
      height: 200px;
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.6;
    }
    #chat-messages .npc { color: #0d6efd; font-weight: bold; }
    #chat-messages .user { color: #2f3e46; }
    #chat-input-row { display: flex; gap: 8px; }
    #chat-input {
      flex: 1;
      background: #ffffff;
      border: 1px solid #9ec5fe;
      border-radius: 4px;
      color: #1f2d3d;
      padding: 8px 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    #chat-send {
      background: #0d6efd;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    #chat-send:hover { background: #0b5ed7; }
    #chat-close {
      position: absolute;
      top: 8px; right: 12px;
      background: none; border: none;
      color: #5a6a85; cursor: pointer; font-size: 18px;
    }
    #npc-name {
      font-size: 16px;
      font-weight: bold;
      color: #0d6efd;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Chat UI overlay (shown when player interacts with an NPC) -->
  <div id="chat-overlay">
    <button id="chat-close" aria-label="Close chat">✕</button>
    <div id="npc-name"></div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask a body question..." autocomplete="off" />
      <button id="chat-send">Send</button>
    </div>
  </div>
</body>
</html>
