<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BodyAgents</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    #chat-overlay {
      display: none;
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(720px, calc(100vw - 24px));
      background: rgba(13, 19, 28, 0.96);
      border: 2px solid rgba(236, 219, 180, 0.38);
      border-radius: 14px;
      padding: 16px;
      z-index: 100;
      color: #f5e7c7;
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.45);
    }

    #chat-messages {
      height: 220px;
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.6;
    }

    #chat-messages .npc {
      color: #e6be77;
      font-weight: bold;
    }

    #chat-messages .user {
      color: #f6f1e4;
    }

    #chat-input-row {
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: rgba(8, 12, 18, 0.95);
      border: 1px solid rgba(236, 219, 180, 0.26);
      border-radius: 8px;
      color: #f5e7c7;
      padding: 8px 12px;
      font-size: 14px;
    }

    #chat-send {
      background: #f3e7c8;
      color: #22180f;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
    }

    #chat-send:hover {
      background: #fff3d5;
    }

    #chat-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #d9be8b;
      cursor: pointer;
      font-size: 18px;
    }

    #npc-name {
      font-size: 16px;
      font-weight: bold;
      color: #e6be77;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="game-container"></div>
  </main>

  <div id="chat-overlay">
    <button id="chat-close" aria-label="Close chat">✕</button>
    <div id="npc-name"></div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask a body question..." autocomplete="off" />
      <button id="chat-send">Send</button>
    </div>
  </div>
</body>
</html>
