services:
  mongodb:
    image: mongo:7.0
    container_name: philoagents-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=philoagents
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./philoagents
      dockerfile: backend/Dockerfile
    container_name: philoagents-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: philoagents-frontend
    working_dir: /app
    volumes:
      - ./philoagents/frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
