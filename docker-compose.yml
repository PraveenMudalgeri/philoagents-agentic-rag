version: "3.9"

services:
  backend:
    build:
      context: ./philoagents
      dockerfile: backend/Dockerfile
    container_name: philoagents-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: philoagents-frontend
    working_dir: /app
    volumes:
      - ./philoagents/frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
